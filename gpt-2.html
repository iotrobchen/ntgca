<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高程YOYO班202601期 飛場資訊觀測站</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
body{
 font-family:'Noto Sans TC',sans-serif;
 background:linear-gradient(135deg,#dfe9f3,#ffffff);
 margin:0;padding:20px;
}
.container{max-width:1200px;margin:auto;}
header{text-align:center;margin-bottom:30px;}
h1{margin:0;font-size:2rem;}
.location-section{
 background:rgba(255,255,255,0.6);
 backdrop-filter:blur(10px);
 border-radius:16px;
 padding:20px;
 margin-bottom:30px;
 box-shadow:0 8px 25px rgba(0,0,0,0.1);
}
h2{border-left:6px solid #007bff;padding-left:10px;}
.status-bar{display:flex;justify-content:space-between;align-items:center;margin:10px 0;}
.status-light{padding:6px 14px;border-radius:20px;color:#fff;font-weight:bold;}
.good{background:#28a745;} .warn{background:#ffc107;color:#333;} .bad{background:#dc3545;}
.widget-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
@media(max-width:768px){.widget-grid{grid-template-columns:1fr;}}
iframe{width:100%;height:28vh;min-height:220px;border:none;border-radius:10px;}
.cam-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:15px;margin-top:15px;}
.cam-box{background:#000;border-radius:10px;overflow:hidden;position:relative;}
.cam-box img, .cam-box iframe{width:100%;display:block;}
.label{position:absolute;top:5px;left:5px;background:rgba(0,0,0,0.6);color:#fff;padding:3px 8px;border-radius:6px;font-size:12px;}
</style>
</head>
<body>
<div class="container">
<header>
<h1>高程YOYO班202601期 飛場資訊觀測站</h1>
<div id="clock"></div>
</header>

<section class="location-section">
<h2>後村堰飛場</h2>
<div class="status-bar">
<div id="status-houchun" class="status-light">讀取中</div>
<div id="time-houchun"></div>
</div>
<div class="widget-grid">
<iframe src="https://www.twipcam.com/widget/v1/wx-info?lat=24.960462&lon=121.379289"></iframe>
<iframe src="https://www.twipcam.com/widget/v1/wind?lat=24.960462&lon=121.379289&zoom=8"></iframe>
</div>
<div class="cam-grid">
<div class="cam-box">
<span class="label">地面狀況</span>
<img id="cam1" src="https://c01.twipcam.com/cam/snapshot/nwt-000274.jpg">
</div>
<div class="cam-box">
<span class="label">高空雲層</span>
<iframe src="https://cctvn.freeway.gov.tw/abs2mjpg/bmjpg?camera=34720"></iframe>
</div>
</div>
</section>

<section class="location-section">
<h2>浮洲飛場</h2>
<div class="status-bar">
<div id="status-fuzhou" class="status-light">讀取中</div>
<div id="time-fuzhou"></div>
</div>
<div class="widget-grid">
<iframe src="https://www.twipcam.com/widget/v1/wx-info?lat=24.989166&lon=121.440113"></iframe>
<iframe src="https://www.twipcam.com/widget/v1/wind?lat=24.989166&lon=121.440113&zoom=8"></iframe>
</div>
<div class="cam-grid">
<div class="cam-box">
<span class="label">台65</span>
<img id="cam2" src="https://c01.twipcam.com/cam/snapshot/t65-10k-126.jpg">
</div>
<div class="cam-box">
<span class="label">抽水站</span>
<img id="cam3" src="https://c01.twipcam.com/cam/snapshot/wra-002469.jpg">
</div>
</div>
</section>
</div>

<script>
function updateClock(){
 const now=new Date();
 document.getElementById('clock').innerText='更新：'+now.toLocaleString();
 document.getElementById('time-houchun').innerText=now.toLocaleTimeString();
 document.getElementById('time-fuzhou').innerText=now.toLocaleTimeString();
}

// 改良判斷：陣風權重提高
function judge(w,g){
 const score = (w*0.6 + g*0.4);
 if(score<4.5)return{cls:'good',txt:'🟢 穩定可飛'};
 if(score<7)return{cls:'warn',txt:'🟡 偏風需注意'};
 return{cls:'bad',txt:'🔴 風險過高'};
}

async function update(){
 try{
 const h=await fetch('https://api.open-meteo.com/v1/forecast?latitude=24.960462&longitude=121.379289&current=wind_speed_10m,wind_gusts_10m').then(r=>r.json());
 const f=await fetch('https://api.open-meteo.com/v1/forecast?latitude=24.989166&longitude=121.440113&current=wind_speed_10m,wind_gusts_10m').then(r=>r.json());
 
 let s=judge(h.current.wind_speed_10m,h.current.wind_gusts_10m);
 let el=document.getElementById('status-houchun');
 el.className='status-light '+s.cls;
 el.innerText=s.txt+` (${h.current.wind_speed_10m.toFixed(1)} / ${h.current.wind_gusts_10m.toFixed(1)})`;

 s=judge(f.current.wind_speed_10m,f.current.wind_gusts_10m);
 el=document.getElementById('status-fuzhou');
 el.className='status-light '+s.cls;
 el.innerText=s.txt+` (${f.current.wind_speed_10m.toFixed(1)} / ${f.current.wind_gusts_10m.toFixed(1)})`;

 }catch(e){console.log(e)}
}

// 影像刷新避免快取
function refreshImages(){
 const t=new Date().getTime();
 document.getElementById('cam1').src=`https://c01.twipcam.com/cam/snapshot/nwt-000274.jpg?t=${t}`;
 document.getElementById('cam2').src=`https://c01.twipcam.com/cam/snapshot/t65-10k-126.jpg?t=${t}`;
 document.getElementById('cam3').src=`https://c01.twipcam.com/cam/snapshot/wra-002469.jpg?t=${t}`;
}

updateClock();update();refreshImages();
setInterval(()=>{updateClock();update();refreshImages();},60000);
</script>

</body>
</html>
